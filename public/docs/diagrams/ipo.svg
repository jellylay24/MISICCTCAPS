<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <rect width="780" height="520" fill="#ffffff" rx="8"/>
  <text x="390" y="35" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a237e">IPO Chart — Input, Process, Output</text>
  <text x="390" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">ICCT Cainta Campus MIS Resource Management System</text>

  <!-- Header Row -->
  <rect x="30" y="75" width="220" height="40" rx="6" fill="#1a237e"/>
  <text x="140" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">INPUT</text>

  <rect x="270" y="75" width="240" height="40" rx="6" fill="#283593"/>
  <text x="390" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">PROCESS</text>

  <rect x="530" y="75" width="220" height="40" rx="6" fill="#3949ab"/>
  <text x="640" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">OUTPUT</text>

  <!-- Row 1 -->
  <rect x="30" y="125" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Login Credentials</text>
  <text x="140" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Email &amp; Password</text>

  <rect x="270" y="125" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Authentication</text>
  <text x="390" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Validate credentials, check role</text>

  <rect x="530" y="125" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Dashboard Access</text>
  <text x="640" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Role-based dashboard view</text>

  <!-- Row 2 -->
  <rect x="30" y="190" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Borrow Request</text>
  <text x="140" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Item, quantity, duration (1h/2h/3h)</text>

  <rect x="270" y="190" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Create Pending Request</text>
  <text x="390" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Save to DB, notify admin</text>

  <rect x="530" y="190" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Pending Record</text>
  <text x="640" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Waiting for admin approval</text>

  <!-- Row 3 -->
  <rect x="30" y="255" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Admin Approval</text>
  <text x="140" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Approve or Reject + reason</text>

  <rect x="270" y="255" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Process Decision</text>
  <text x="390" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Update status, create notification</text>

  <rect x="530" y="255" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">✅ Approved / ❌ Rejected</text>
  <text x="640" y="295" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Active borrow or rejected notice</text>

  <!-- Row 4 -->
  <rect x="30" y="320" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="343" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Time Passes</text>
  <text x="140" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Due date arrives / passes</text>

  <rect x="270" y="320" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="343" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Cron: Check due_at &lt; now()</text>
  <text x="390" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Detect overdue, send alert</text>

  <rect x="530" y="320" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="343" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">🔴 Overdue Alert</text>
  <text x="640" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Red banner + notification</text>

  <!-- Row 5 -->
  <rect x="30" y="385" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="408" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Admin marks Returned</text>
  <text x="140" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Click "Mark Returned"</text>

  <rect x="270" y="385" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="408" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Update Status</text>
  <text x="390" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Set returned_at, change status</text>

  <rect x="530" y="385" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="408" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">📦 Item Returned</text>
  <text x="640" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Transaction complete</text>

  <!-- Row 6 -->
  <rect x="30" y="450" width="220" height="55" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="473" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Export Request</text>
  <text x="140" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Admin clicks "Export CSV"</text>

  <rect x="270" y="450" width="240" height="55" rx="4" fill="#e8eaf6" stroke="#1a237e" stroke-width="1.5"/>
  <text x="390" y="473" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a237e">Generate CSV</text>
  <text x="390" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Format all records as CSV</text>

  <rect x="530" y="450" width="220" height="55" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="640" y="473" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">📄 CSV File</text>
  <text x="640" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Downloadable report</text>
</svg>
