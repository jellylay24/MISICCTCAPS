<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 900" width="500" height="900">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" /><stop offset="100%" style="stop-color:#283593;stop-opacity:1" /></linearGradient>
    <linearGradient id="procGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" /><stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" /></linearGradient>
    <linearGradient id="decGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" /><stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" /></linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" /><stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" /></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
  </defs>
  <rect width="500" height="900" fill="#fafafa" rx="10"/>
  <text x="250" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Borrow Process Flowchart</text>

  <!-- Start -->
  <ellipse cx="250" cy="70" rx="90" ry="22" fill="url(#startGrad)" stroke="#1a237e" stroke-width="2"/>
  <text x="250" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Faculty Logs In</text>

  <line x1="250" y1="92" x2="250" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Browse Resources -->
  <rect x="150" y="125" width="200" height="45" rx="8" fill="url(#procGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="145" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Browse Resources</text>
  <text x="250" y="162" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Check availability</text>

  <line x1="250" y1="170" x2="250" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Available? -->
  <polygon points="250,200 330,245 250,290 170,245" fill="url(#decGrad)" stroke="#e65100" stroke-width="1.5"/>
  <text x="250" y="242" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Available?</text>

  <!-- No branch -->
  <line x1="170" y1="245" x2="85" y2="245" stroke="#c62828" stroke-width="1.5"/>
  <line x1="85" y1="245" x2="85" y2="290" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="265" font-family="sans-serif" font-size="11" fill="#c62828" font-weight="bold">No</text>
  
  <rect x="30" y="295" width="110" height="40" rx="20" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="85" y="320" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c62828">Cannot Borrow</text>

  <!-- Yes branch -->
  <line x1="330" y1="245" x2="400" y2="245" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="400" y1="245" x2="400" y2="350" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="400" y1="350" x2="350" y2="350" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="365" y="265" font-family="sans-serif" font-size="11" fill="#2e7d32" font-weight="bold">Yes</text>

  <!-- Select Duration -->
  <rect x="140" y="355" width="220" height="50" rx="8" fill="url(#procGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Select Duration</text>
  <text x="250" y="395" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">1h · 2h · 3h · Custom (3:30)</text>

  <line x1="250" y1="405" x2="250" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Submit Request -->
  <rect x="140" y="435" width="220" height="45" rx="8" fill="url(#procGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="250" y="455" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Submit Borrow Request</text>
  <text x="250" y="472" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Status: Pending</text>

  <line x1="250" y1="480" x2="250" y2="505" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Admin Approve -->
  <polygon points="250,510 340,555 250,600 160,555" fill="url(#decGrad)" stroke="#e65100" stroke-width="1.5"/>
  <text x="250" y="552" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Admin</text>
  <text x="250" y="567" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Approves?</text>

  <!-- No branch -->
  <line x1="160" y1="555" x2="60" y2="555" stroke="#c62828" stroke-width="1.5"/>
  <line x1="60" y1="555" x2="60" y2="630" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="575" font-family="sans-serif" font-size="11" fill="#c62828" font-weight="bold">No</text>

  <rect x="10" y="635" width="100" height="40" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="60" y="655" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c62828">Rejected</text>
  <text x="60" y="670" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">+ Reason</text>

  <!-- Yes branch -->
  <line x1="340" y1="555" x2="420" y2="555" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="420" y1="555" x2="420" y2="635" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="420" y1="635" x2="350" y2="635" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="575" font-family="sans-serif" font-size="11" fill="#2e7d32" font-weight="bold">Yes</text>

  <rect x="240" y="620" width="120" height="30" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="300" y="639" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">✅ Approved</text>

  <line x1="300" y1="650" x2="300" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Active + Countdown -->
  <rect x="170" y="685" width="260" height="40" rx="8" fill="url(#procGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="705" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Item Active · Countdown Timer</text>
  <text x="300" y="718" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Due date tracking with color-coded timer</text>

  <line x1="300" y1="725" x2="300" y2="755" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision Overdue -->
  <polygon points="300,760 360,790 300,820 240,790" fill="url(#decGrad)" stroke="#e65100" stroke-width="1.5"/>
  <text x="300" y="788" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e65100">Overdue?</text>

  <!-- Overdue Arrow -->
  <line x1="240" y1="790" x2="145" y2="790" stroke="#c62828" stroke-width="1.5"/>
  <line x1="145" y1="790" x2="145" y2="835" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="778" font-family="sans-serif" font-size="10" fill="#c62828" font-weight="bold">Yes</text>

  <rect x="70" y="840" width="150" height="35" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="145" y="855" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c62828">🔴 Red Alert Banner</text>
  <text x="145" y="869" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">+ Notification sent</text>

  <!-- Not overdue -->
  <line x1="360" y1="790" x2="420" y2="790" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="420" y1="790" x2="420" y2="855" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="420" y1="855" x2="380" y2="855" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="390" y="778" font-family="sans-serif" font-size="10" fill="#2e7d32" font-weight="bold">No</text>

  <!-- Returned -->
  <rect x="270" y="840" width="120" height="35" rx="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="330" y="855" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">📦 Returned</text>
  <text x="330" y="869" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Timestamp recorded</text>
</svg>
